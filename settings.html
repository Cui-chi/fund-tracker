<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>基金配置</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d2430;
      --muted: #697386;
      --line: #d9dee7;
      --blue: #2f6fed;
      --blue-dark: #2458bd;
      --success: #26734d;
      --success-bg: #e8f4ee;
      --danger: #b42318;
      --danger-bg: #ffe2df;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 24px 32px 18px;
    }
    .header-inner {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .back {
      color: var(--blue);
      font-size: 14px;
      font-weight: 650;
      text-decoration: none;
      white-space: nowrap;
    }
    .back:hover { text-decoration: underline; }
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 32px 110px;
    }
    .funds {
      display: grid;
      gap: 12px;
    }
    .funds-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 20px 0 12px;
    }
    .funds-toolbar h2 { margin: 0; font-size: 19px; }
    .funds-toolbar p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .system-config {
      margin-bottom: 18px;
      background: #172033;
      color: #fff;
      border-radius: 10px;
      padding: 20px;
    }
    .system-config h2 { margin: 0 0 5px; font-size: 19px; }
    .system-config p { margin: 0 0 16px; color: #bac5d6; font-size: 12px; }
    .system-config label { color: #bac5d6; }
    .system-config input { border-color: #45536b; background: #243047; color: #fff; }
    .fund {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .fund-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .fund-head-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fund-name { font-size: 16px; font-weight: 700; }
    .fund-meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .fields {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    label.strategy-field { grid-column: span 2; }
    input {
      width: 100%;
      height: 40px;
      border: 1px solid #c9d0dc;
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 0 10px;
      outline: none;
    }
    select {
      width: 100%;
      height: 40px;
      border: 1px solid #c9d0dc;
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 0 10px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.14);
    }
    .save-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      padding: 14px 32px;
    }
    .save-inner {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }
    #status {
      color: var(--muted);
      font-size: 13px;
      margin-right: auto;
    }
    #status.success {
      color: var(--success);
      background: var(--success-bg);
      padding: 7px 10px;
      border-radius: 6px;
    }
    #status.error {
      color: var(--danger);
      background: var(--danger-bg);
      padding: 7px 10px;
      border-radius: 6px;
    }
    button {
      height: 40px;
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 0 20px;
      cursor: pointer;
    }
    button:hover { background: var(--blue-dark); }
    button:disabled { opacity: 0.55; cursor: wait; }
    button.secondary {
      border: 1px solid var(--blue);
      background: #fff;
      color: var(--blue);
    }
    button.secondary:hover { background: #eef4ff; }
    button.danger {
      height: 32px;
      border: 1px solid #efb5af;
      background: #fff;
      color: var(--danger);
      padding: 0 12px;
      font-size: 12px;
    }
    button.danger:hover { background: var(--danger-bg); }
    @media (max-width: 980px) {
      .fields { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      header { padding: 20px 18px 16px; }
      main { padding: 18px 18px 104px; }
      .fields { grid-template-columns: 1fr; }
      label.strategy-field { grid-column: auto; }
      .fund-head { display: block; }
      .fund-meta { margin-top: 4px; }
      .fund-head-actions { margin-top: 10px; justify-content: space-between; }
      .funds-toolbar { align-items: flex-end; }
      .save-bar { padding: 12px 18px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>基金配置</h1>
      <a class="back" href="/dashboard.html">返回监控</a>
    </div>
  </header>
  <main>
    <form id="config-form">
      <section class="system-config">
        <h2>Asset Allocation Copilot V7</h2>
        <p>社融、M2及美股代理估值会自动更新。以下字段仅作自动源失败或历史样本不足时的人工回退；留空不会用中性值代替。</p>
        <p style="margin-top:6px;color:#2b65d9;font-weight:600;">持仓金额、当前盈亏与现金请在监控页「持仓管理」编辑，此处不再管理。</p>
        <div class="fields">
          <label>每月动态资金<input id="monthly_contribution" type="number" min="0" step="0.01"></label>
          <label>首月允许绝对GapValue触发
            <select id="allow_absolute_gap_on_initialization">
              <option value="true">允许，最多普通释放25%</option>
              <option value="false">不允许，仅建立Baseline</option>
            </select>
          </label>
          <label>社融存量同比（%）<input id="social_financing_yoy" type="number" step="0.01"></label>
          <label>M2同比（%）<input id="m2_yoy" type="number" step="0.01"></label>
          <label>纳斯达克100 PE百分位<input id="nasdaq100_pe_percentile" type="number" min="0" max="100" step="0.01"></label>
          <label>标普500 PE百分位<input id="sp500_pe_percentile" type="number" min="0" max="100" step="0.01"></label>
        </div>
      </section>
      <div class="funds-toolbar">
        <div>
          <h2>基金清单</h2>
          <p>可新增、删除并配置基金；删除不会清理历史净值。</p>
        </div>
        <button id="add-fund" class="secondary" type="button">新增基金</button>
      </div>
      <div id="funds" class="funds"></div>
    </form>
  </main>
  <div class="save-bar">
    <div class="save-inner">
      <div id="status">正在读取配置...</div>
      <button id="save" type="submit" form="config-form" disabled>保存修改</button>
    </div>
  </div>
  <script>
    const fields = [
      ["code", "基金代码", "text", null],
      ["name", "基金名称", "text", null],
      ["type", "基金类型", "text", null],
      ["asset_class", "V7资产分类", "select", null],
      ["strategy", "定投策略", "text", null],
      ["daily_auto_invest", "每日定投金额", "number", "0.01"],
      ["weekly_auto_invest", "每周定投金额", "number", "0.01"],
      ["max_holding_amount", "持仓上限", "number", "0.01"],
      ["drawdown_20_buy_amount", "回撤20%补仓金额", "number", "0.01"],
      ["drawdown_30_buy_amount", "回撤30%补仓金额", "number", "0.01"]
    ];
    let config = null;
    const assetClassOptions = [
      ["a_share", "A股"],
      ["us_equity", "美股"],
      ["gold", "黄金"],
      ["cash", "现金/固收"]
    ];

    function valueOf(fund, key) {
      if (key === "strategy") return fund[key] || "无";
      return fund[key] ?? 0;
    }

    function render(resetSystemFields = true) {
      const root = document.getElementById("funds");
      root.replaceChildren();
      config.funds.forEach((fund) => {
        const section = document.createElement("section");
        section.className = "fund";
        const head = document.createElement("div");
        head.className = "fund-head";
        head.innerHTML = `<div class="fund-name"></div><div class="fund-head-actions"><div class="fund-meta"></div></div>`;
        head.querySelector(".fund-name").textContent = fund.name;
        head.querySelector(".fund-meta").textContent = `${fund.code} · ${fund.type}`;
        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "danger";
        removeButton.textContent = "删除";
        removeButton.addEventListener("click", () => {
          if (config.funds.length <= 1) {
            document.getElementById("status").textContent = "至少保留一只基金";
            return;
          }
          config.funds = config.funds.filter((item) => item !== fund);
          render(false);
        });
        head.querySelector(".fund-head-actions").appendChild(removeButton);

        const fieldGrid = document.createElement("div");
        fieldGrid.className = "fields";
        fields.forEach(([key, labelText, type, step]) => {
          const label = document.createElement("label");
          if (key === "strategy") label.className = "strategy-field";
          label.textContent = labelText;
          const input = document.createElement("input");
          input.name = key;
          let control = input;
          if (type === "select") {
            control = document.createElement("select");
            control.name = key;
            assetClassOptions.forEach(([value, text]) => {
              const option = document.createElement("option");
              option.value = value;
              option.textContent = text;
              control.appendChild(option);
            });
          } else {
            input.type = type;
            if (step) input.step = step;
            if (type === "number" && key !== "profit_pct") input.min = "0";
            if (key === "strategy" || key === "name") input.maxLength = 100;
            if (key === "code") {
              input.maxLength = 6;
              input.inputMode = "numeric";
              input.pattern = "\\d{6}";
            }
          }
          control.value = valueOf(fund, key);
          label.appendChild(control);
          fieldGrid.appendChild(label);
        });

        section.append(head, fieldGrid);
        root.appendChild(section);
      });
      if (resetSystemFields) {
        const copilot = config.copilot_v7 || {};
        const releaseRules = copilot.release_rules || {};
        const manual = copilot.manual_indicators || {};
        document.getElementById("monthly_contribution").value = copilot.monthly_contribution ?? 2500;
        document.getElementById("allow_absolute_gap_on_initialization").value =
          String(releaseRules.allow_absolute_gap_on_initialization ?? true);
        [
          "social_financing_yoy",
          "m2_yoy",
          "nasdaq100_pe_percentile",
          "sp500_pe_percentile"
        ].forEach((key) => {
          document.getElementById(key).value = manual[key] ?? "";
        });
      }
      document.getElementById("save").disabled = false;
      document.getElementById("status").textContent = "配置已载入";
    }

    async function loadConfig() {
      const response = await fetch("/api/config", { cache: "no-store" });
      if (!response.ok) throw new Error("配置读取失败");
      config = await response.json();
      render();
    }

    function collectFunds() {
      return Array.from(document.querySelectorAll(".fund")).map((section) => {
        const fund = {};
        section.querySelectorAll("input, select").forEach((input) => {
          fund[input.name] = input.type === "number" ? Number(input.value) : input.value;
        });
        return fund;
      });
    }

    document.getElementById("add-fund").addEventListener("click", () => {
      config.funds.push({
        code: "",
        name: "新基金",
        type: "美股QDII",
        asset_class: "us_equity",
        holding_amount: 0,
        profit_pct: 0,
        strategy: "无",
        daily_auto_invest: 0,
        weekly_auto_invest: 0,
        max_holding_amount: 0,
        drawdown_20_buy_amount: 0,
        drawdown_30_buy_amount: 0
      });
      render(false);
      document.querySelector(".fund:last-child input[name=code]").focus();
    });

    function numberOrNull(id) {
      const value = document.getElementById(id).value.trim();
      return value === "" ? null : Number(value);
    }

    document.getElementById("config-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = document.getElementById("save");
      const status = document.getElementById("status");
      button.disabled = true;
      status.className = "";
      status.textContent = "正在保存...";
      try {
        const response = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            funds: collectFunds(),
            copilot_v7: {
              monthly_contribution: Number(document.getElementById("monthly_contribution").value),
              release_rules: {
                allow_absolute_gap_on_initialization:
                  document.getElementById("allow_absolute_gap_on_initialization").value === "true"
              },
              manual_indicators: {
                social_financing_yoy: numberOrNull("social_financing_yoy"),
                m2_yoy: numberOrNull("m2_yoy"),
                nasdaq100_pe_percentile: numberOrNull("nasdaq100_pe_percentile"),
                sp500_pe_percentile: numberOrNull("sp500_pe_percentile")
              }
            }
          })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || "保存失败");
        status.className = "success";
        status.textContent = result.message;
      } catch (error) {
        status.className = "error";
        status.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    });

    loadConfig().catch((error) => {
      const status = document.getElementById("status");
      status.className = "error";
      status.textContent = error.message;
    });
  </script>
</body>
</html>
